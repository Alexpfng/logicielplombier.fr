<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title par défaut (repli sans JS). Description, canonical, Open Graph et Twitter
         sont gérés par page via le composant Seo (react-helmet-async). -->
    <title>Logiciel Plombier — Centralisez vos demandes clients | Bulbiz</title>
    <meta name="author" content="logiciel-plombier.fr" />

    <!-- Données structurées globales (présentes dans le HTML brut, indépendantes du JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "logiciel-plombier.fr",
      "url": "https://logiciel-plombier.fr/",
      "description": "Guide indépendant des logiciels et applications pour plombiers et chauffagistes.",
      "logo": "https://logiciel-plombier.fr/favicon.ico"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "logiciel-plombier.fr",
      "url": "https://logiciel-plombier.fr/",
      "inLanguage": "fr-FR"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Bulbiz",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://bulbiz.io",
      "description": "Assistant métier pour artisans du BTP (plombiers, chauffagistes) qui centralise les demandes clients (téléphone, SMS, WhatsApp, Google), structure automatiquement les dossiers et aide au suivi des interventions et devis.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Test gratuit, sans engagement"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
